<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111C"/>
      <stop offset="1" stop-color="#102235"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#122033"/>
      <stop offset="1" stop-color="#0A1422"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#60A5FA"/>
    </marker>
  </defs>

  <rect width="1280" height="760" rx="28" fill="url(#bg)"/>

  <text x="70" y="82" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">ForgeFlow Architecture</text>
  <text x="70" y="116" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="18">GitHub-friendly overview of the intake, memory, orchestration, and audit loop.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="160" width="320" height="220" rx="24" fill="url(#panel)" stroke="#24415F"/>
    <rect x="478" y="160" width="320" height="220" rx="24" fill="url(#panel)" stroke="#24415F"/>
    <rect x="884" y="160" width="320" height="220" rx="24" fill="url(#panel)" stroke="#24415F"/>
    <rect x="275" y="458" width="320" height="220" rx="24" fill="url(#panel)" stroke="#24415F"/>
    <rect x="681" y="458" width="320" height="220" rx="24" fill="url(#panel)" stroke="#24415F"/>
  </g>

  <text x="104" y="214" fill="#D1FAE5" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">1. Intake</text>
  <text x="104" y="254" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Import existing repos</text>
  <text x="104" y="282" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Draft new projects from an idea</text>
  <text x="104" y="310" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Model refine or heuristic-only fallback</text>
  <text x="104" y="338" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Persistent jobs, live logs, cancellation</text>

  <text x="510" y="214" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">2. Project Memory</text>
  <text x="510" y="254" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Primary references</text>
  <text x="510" y="282" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Plans, completed work, future ideas</text>
  <text x="510" y="310" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Editable summaries and source snippets</text>
  <text x="510" y="338" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Injected into later runs</text>

  <text x="918" y="214" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">3. Orchestrator</text>
  <text x="918" y="254" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Planner → Coder → Reviewer</text>
  <text x="918" y="282" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Tester → Debugger</text>
  <text x="918" y="310" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Retries, recovery, fallback model</text>
  <text x="918" y="338" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">State-machine-driven progression</text>

  <text x="308" y="512" fill="#C7D2FE" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">4. Safe Execution</text>
  <text x="308" y="552" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Isolated workspaces</text>
  <text x="308" y="580" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Allowed / blocked paths</text>
  <text x="308" y="608" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Dangerous command blocking</text>
  <text x="308" y="636" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Git-aware sync back to project root</text>

  <text x="714" y="512" fill="#FCA5A5" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">5. Audit and Recovery</text>
  <text x="714" y="552" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Prompt artifacts</text>
  <text x="714" y="580" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Raw model output</text>
  <text x="714" y="608" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">stdout / stderr / git diff / changed files</text>
  <text x="714" y="636" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Rollback manifests and run history</text>

  <path d="M392 270H458" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M798 270H864" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1044 380V430H841" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M638 380V430H435" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M595 568H661" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
